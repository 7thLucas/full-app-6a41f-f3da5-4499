<style>
  .mode-landscape .sl-layout { flex-direction: row; }
  .mode-portrait .sl-layout { flex-direction: column; }
  .mode-landscape .sl-visual { width: 45%; }
  .mode-portrait .sl-visual { width: 100%; height: 40%; }
  .mode-landscape .sl-content { width: 55%; }
  .mode-portrait .sl-content { width: 100%; }
</style>

<section class="w-full h-full overflow-auto bg-white">
  <div class="sl-layout w-full h-full flex">

    <!-- Left: Content -->
    <div class="sl-content flex flex-col justify-between p-12" style="background: #ffffff;">
      <!-- Top accent bar -->
      <div class="flex items-center gap-3">
        <div class="w-8 h-1 rounded-full" style="background: {{config.theme.accentColor}};"></div>
        <span class="text-xs font-semibold tracking-widest uppercase" style="color: {{config.theme.accentColor}}; font-family: {{config.theme.fontFamily}};">Recruitment Intelligence</span>
      </div>

      <!-- Main headline -->
      <div class="flex flex-col gap-6">
        <h1 class="text-5xl font-bold leading-tight" style="color: {{config.theme.primaryColor}}; font-family: {{config.theme.fontFamily}};">
          {{config.appName}}
        </h1>
        <p class="text-2xl font-light" style="color: #334155; font-family: Inter, sans-serif; max-width: 380px; line-height: 1.4;">
          {{config.tagline}}
        </p>
        <p class="text-base" style="color: #64748b; font-family: Inter, sans-serif; max-width: 360px; line-height: 1.6;">
          AI-powered resume screening that compares every candidate to your job requirements — surfacing the best fits in minutes, not hours.
        </p>
      </div>

      <!-- Attribution -->
      <div>
        <data-attribution />
      </div>
    </div>

    <!-- Right: Visual -->
    <div class="sl-visual flex items-center justify-center relative overflow-hidden" style="background: {{config.theme.primaryColor}};">
      <img
        src="https://api-stag.qb-deck.quantumbyte.ai/common/image-generation?prompt=A%20clean%20modern%20recruiter%20dashboard%20showing%20AI%20candidate%20match%20scores%20and%20resume%20cards%20on%20a%20dark%20navy%20background%2C%20professional%20enterprise%20UI%2C%20minimal%20design"
        alt="RecruitIQ Dashboard"
        class="w-full h-full object-cover opacity-80"
      />
      <!-- Overlay stat cards -->
      <div class="absolute bottom-8 left-8 right-8 flex flex-col gap-3">
        <div class="rounded-xl p-4 flex items-center gap-4" style="background: rgba(255,255,255,0.12); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2);">
          <div class="text-3xl font-bold" style="color: #ffffff; font-family: {{config.theme.fontFamily}};">94%</div>
          <div class="text-sm" style="color: rgba(255,255,255,0.8); font-family: Inter, sans-serif;">Average screening accuracy</div>
        </div>
        <div class="rounded-xl p-4 flex items-center gap-4" style="background: rgba(45,125,210,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2);">
          <div class="text-3xl font-bold" style="color: #ffffff; font-family: {{config.theme.fontFamily}};">10×</div>
          <div class="text-sm" style="color: rgba(255,255,255,0.85); font-family: Inter, sans-serif;">Faster than manual review</div>
        </div>
      </div>
    </div>

  </div>
</section>
